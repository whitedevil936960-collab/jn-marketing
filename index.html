<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JN Marketing | Corporate Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--primary:#0f172a;
--accent:#d4af37;
--text:#f8fafc;
--success:#10b981;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#020617;color:var(--text);}
.container{max-width:1200px;margin:auto;padding:20px;}
.glass{background:rgba(255,255,255,0.05);padding:25px;border-radius:15px;margin-bottom:20px;}
.logo{font-size:28px;font-weight:800;color:var(--accent);}
.nav{display:flex;gap:10px;margin:20px 0;}
.nav button{flex:1;padding:12px;border:none;border-radius:8px;cursor:pointer;}
.nav button.active{background:var(--accent);color:black;font-weight:bold;}
.section{display:none;}
.section.active{display:block;}
input,select{width:100%;padding:10px;margin-bottom:15px;border-radius:8px;border:none;}
.btn{padding:12px;width:100%;border:none;border-radius:8px;background:var(--accent);font-weight:bold;cursor:pointer;}
.logout{background:#ef4444;color:white;margin-left:10px;}
#login{position:fixed;top:0;left:0;width:100%;height:100%;background:#020617;display:flex;justify-content:center;align-items:center;}
.login-box{width:350px;text-align:center;}
.role-btn{width:100%;padding:12px;margin-bottom:10px;background:rgba(255,255,255,0.1);border:none;color:white;border-radius:8px;cursor:pointer;}
.role-btn:hover{background:var(--accent);color:black;}
</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="login">
<div class="glass login-box">
<h2 class="logo">JN MARKETING</h2>
<p style="margin:15px 0;color:gray;">Authorized Access Only</p>

<button class="role-btn" onclick="login('whitedevil936960@gmail.com','Team Leader')">
Team Leader Login
</button>

<button class="role-btn" onclick="login('Maurya.chandrabhaskar@gmail.com','CMO')">
CMO Login
</button>

</div>
</div>

<!-- MAIN APP -->
<div class="container" id="app" style="display:none;">

<div style="display:flex;justify-content:space-between;align-items:center;">
<div class="logo">JN Marketing</div>
<div>
<span id="userInfo"></span>
<button class="logout btn" onclick="logout()">Logout</button>
</div>
</div>

<div class="nav">
<button class="active" onclick="show('order',this)">New Order</button>
<button onclick="show('report',this)">Sales Report</button>
<button onclick="show('attendance',this)">Attendance</button>
</div>

<!-- ORDER -->
<div id="order" class="section active glass">
<h3>Place Order</h3>

<select id="product" onchange="setRate()">
<option value="">Select Product</option>
<option value="50">Broom - ₹50</option>
<option value="30">Scrub - ₹30</option>
<option value="80">Wiper - ₹80</option>
<option value="120">Floor Cleaner - ₹120</option>
</select>

<input type="number" id="rate" placeholder="Rate" readonly>
<input type="number" id="qty" placeholder="Quantity" oninput="calcTotal()">
<input type="text" id="total" placeholder="Total" readonly>

<button class="btn" onclick="saveOrder()">Submit Order</button>
</div>

<!-- REPORT -->
<div id="report" class="section glass">
<h3>Total Sales</h3>
<h2 id="totalSales">₹0</h2>
</div>

<!-- ATTENDANCE -->
<div id="attendance" class="section glass">
<h3>Mark Attendance</h3>
<button class="btn" onclick="markAttendance()">Mark Present</button>
<p id="attendanceStatus" style="margin-top:15px;"></p>
</div>

</div>

<script>

const allowedUsers = {
"whitedevil936960@gmail.com":"Team Leader",
"Maurya.chandrabhaskar@gmail.com":"CMO"
};

let totalSales = 0;

function login(email,role){
if(allowedUsers[email] === role){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("userInfo").innerText = role+" | "+email;
}else{
alert("Unauthorized Access");
}
}

function logout(){
location.reload();
}

function show(id,btn){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");

document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

function setRate(){
let val=document.getElementById("product").value;
document.getElementById("rate").value=val;
calcTotal();
}

function calcTotal(){
let r=parseFloat(document.getElementById("rate").value)||0;
let q=parseFloat(document.getElementById("qty").value)||0;
document.getElementById("total").value=r*q;
}

function saveOrder(){
let total=parseFloat(document.getElementById("total").value)||0;
totalSales+=total;
document.getElementById("totalSales").innerText="₹"+totalSales;
alert("Order Saved Successfully");
}

function markAttendance(){
let today=new Date().toLocaleDateString();
document.getElementById("attendanceStatus").innerText="Present Marked on "+today;
}

</script>

</body>
</html>
