<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JN Marketing | Corporate Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Identity Services (Kept for reference, but logic below handles the login) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        :root {
            --primary: #0f172a;
            --secondary: #1e293b;
            --accent: #d4af37; /* Royal Gold */
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-light: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --google-bg: #ffffff;
            --google-text: #3c4043;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background Animation */
        .bg-shape {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.3;
        }
        .shape-1 { top: -10%; left: -10%; width: 600px; height: 600px; background: #3b82f6; }
        .shape-2 { bottom: -10%; right: -10%; width: 500px; height: 500px; background: #d4af37; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .user-badge {
            background: rgba(212, 175, 55, 0.15);
            color: var(--accent);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(212, 175, 55, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Navigation */
        .nav-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 500;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn.active, .nav-btn:hover {
            background: var(--accent);
            color: var(--primary);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            transform: translateY(-2px);
        }

        /* Forms */
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text-dim); font-size: 13px; font-weight: 600; text-transform: uppercase; }
        input, select {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--accent); background: rgba(0, 0, 0, 0.5); }

        /* Buttons */
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #d4af37 0%, #fcd34d 100%);
            border: none;
            border-radius: 12px;
            color: var(--primary);
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(212, 175, 55, 0.4); }

        .btn-attendance {
            background: var(--success);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }
        .btn-attendance:hover { background: #059669; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }

        /* Tables */
        .table-container { overflow-x: auto; border-radius: 10px; border: 1px solid var(--glass-border); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid var(--glass-border); }
        th { color: var(--accent); font-weight: 600; text-transform: uppercase; font-size: 12px; background: rgba(0,0,0,0.2); }
        td { color: var(--text-light); font-size: 14px; }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }
        .stat-card:hover { background: rgba(255, 255, 255, 0.06); border-color: var(--accent); }
        .stat-icon {
            width: 50px; height: 50px;
            background: rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: var(--accent); font-size: 20px;
        }
        .stat-info h3 { font-size: 24px; margin-bottom: 5px; color: white; }
        .stat-info p { font-size: 12px; color: var(--text-dim); }

        /* Sections */
        .section { display: none; animation: fadeIn 0.5s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Login Overlay */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.98);
            z-index: 1000;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(10px);
        }
        .login-box {
            width: 100%; max-width: 400px; text-align: center; padding: 40px;
        }
        .login-logo { font-size: 32px; font-weight: 800; color: var(--accent); margin-bottom: 10px; }
        .login-subtitle { color: var(--text-dim); margin-bottom: 30px; }
        
        .role-btn {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-light);
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 16px;
        }
        
        .role-btn:hover {
            background: var(--accent);
            color: var(--primary);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .role-btn i { font-size: 18px; }

        @media (max-width: 768px) {
            .nav-tabs { flex-direction: column; }
            .nav-btn { width: 100%; text-align: center; justify-content: center; }
            .stats-grid { grid-template-columns: 1fr; }
            .logo { font-size: 20px; }
        }
    </style>
</head>
<body>

    <!-- Background Shapes -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <!-- Login Overlay -->
    <div id="login-overlay">
        <div class="glass-panel login-box">
            <div class="login-logo">JN MARKETING</div>
            <p class="login-subtitle">Corporate Access Portal</p>
            
            <!-- Login Buttons for Specific Roles -->
            <button class="role-btn" onclick="loginUser('whitedevil936960@gmail.com', 'Team Leader')">
                <i class="fas fa-user-tie"></i> Login as Team Leader
            </button>
            
            <button class="role-btn" onclick="loginUser('Maurya.chandrabhaskar@gmail.com', 'CMO')">
                <i class="fas fa-chess-king"></i> Login as CMO
            </button>

            <p style="color: var(--text-dim); font-size: 12px; margin-top: 20px;">
                Secure Access • Authorized Personnel Only
            </p>
        </div>
    </div>

    <!-- Main Application -->
    <div class="container" id="app" style="display: none;">
        
        <header>
            <div class="logo">JN <span style="color:white">Marketing</span></div>
            <div class="user-badge" id="user-role-display">
                <i class="fas fa-user"></i> <span id="user-email">Guest</span>
            </div>
        </header>

        <!-- Navigation -->
        <div class="nav-tabs">
            <button class="nav-btn active" onclick="showSection('order')"><i class="fas fa-box-open"></i> New Order</button>
            <button class="nav-btn" onclick="showSection('report')"><i class="fas fa-chart-line"></i> Sales Report</button>
            <button class="nav-btn" onclick="showSection('attendance')"><i class="fas fa-clock"></i> Attendance</button>
        </div>

        <!-- 1. Order Management Section -->
        <div id="order" class="section active">
            <div class="glass-panel">
                <h2 style="margin-bottom: 20px; color: var(--accent);">📦 Place New Order</h2>
                
                <div class="form-group">
                    <label>Select Product Category</label>
                    <select id="category-select" onchange="loadProducts()">
                        <option value="">-- Choose Category --</option>
                        <option value="Brooms">🧹 Brooms</option>
                        <option value="Scrub">🧽 Scrub</option>
                        <option value="Wiper">🪣 Wiper</option>
                        <option value="Dishwash">🍽 Dishwash</option>
                        <option value="Handwash">🧴 Handwash</option>
                        <option value="Floor Cleaner">🧼 Floor Cleaner</option>
                        <option value="Toilet Cleaner">🚽 Toilet Cleaner</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Select Product</label>
                    <select id="product-select" onchange="autoFillRate()">
                        <option value="">-- Select Category First --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Rate (₹)</label>
                    <input type="text" id="rate-input" readonly style="background: rgba(0,0,0,0.3); color: var(--accent); font-weight: bold;">
                </div>

                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="qty-input" placeholder="Enter Quantity" oninput="calculateTotal()">
                </div>

                <div class="form-group">
                    <label>Total Amount (₹)</label>
                    <input type="text" id="total-input" readonly style="background: rgba(0,0,0,0.3); color: var(--success); font-weight: bold; font-size: 18px;">
                </div>

                <button class="btn-primary" onclick="submitOrder()">Submit Order</button>
            </div>
        </div>

        <!-- 2. Sales Report Section -->
        <div id="report" class="section">
            <div class="glass-panel">
                <h2 style="margin-bottom: 20px; color: var(--accent);">📊 Sales Performance</h2>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-rupee-sign"></i>
