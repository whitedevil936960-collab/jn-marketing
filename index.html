<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JN Marketing | Corporate Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--primary:#0f172a;
--accent:#d4af37;
--text:#f8fafc;
--success:#10b981;
--danger:#ef4444;
--bg-glass: rgba(255,255,255,0.05);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#020617;color:var(--text); min-height:100vh;}
.container{max-width:1200px;margin:auto;padding:20px;}
.glass{background:var(--bg-glass);padding:25px;border-radius:15px;margin-bottom:20px;border:1px solid rgba(255,255,255,0.1);}
.logo{font-size:28px;font-weight:800;color:var(--accent);}
.nav{display:flex;gap:10px;margin:20px 0;flex-wrap:wrap;}
.nav button{flex:1;min-width:120px;padding:12px;border:none;border-radius:8px;cursor:pointer;background:rgba(255,255,255,0.05);color:white;}
.nav button.active{background:var(--accent);color:black;font-weight:bold;}
.section{display:none;}
.section.active{display:block;}
input,select{width:100%;padding:12px;margin-bottom:15px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.2);color:white;}
.btn{padding:12px;width:100%;border:none;border-radius:8px;background:var(--accent);font-weight:bold;cursor:pointer;}
.logout{background:var(--danger);color:white;width:auto;padding:10px 20px;}
.total-box{margin-top:15px;font-size:18px;font-weight:bold;color:var(--accent);}

/* Login */
#login{position:fixed;top:0;left:0;width:100%;height:100%;background:#020617;display:flex;justify-content:center;align-items:center;z-index:1000;}
.login-box{width:350px;text-align:center;}
.role-btn{width:100%;padding:12px;margin-bottom:10px;background:rgba(255,255,255,0.1);border:none;color:white;border-radius:8px;cursor:pointer;}
.role-btn:hover{background:var(--accent);color:black;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="glass login-box">
<h2 class="logo">JN MARKETING</h2>
<p style="margin:15px 0;color:gray;">Authorized Access Only</p>

<button class="role-btn" onclick="login('whitedevil936960@gmail.com','Team Leader')">
<i class="fas fa-user-tie"></i> Team Leader Login
</button>

<button class="role-btn" onclick="login('Maurya.chandrabhaskar@gmail.com','CMO')">
<i class="fas fa-user-tie"></i> CMO Login
</button>

</div>
</div>

<!-- MAIN APP -->
<div class="container" id="app" style="display:none;">

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
<div class="logo">JN Marketing</div>
<div>
<span id="userInfo" style="margin-right:15px;font-size:0.9em;color:#ccc;"></span>
<button class="btn logout" onclick="logout()">Logout</button>
</div>
</div>

<div class="nav">
<button class="active" onclick="show('order',this)">New Order</button>
<button onclick="show('report',this)">Sales Report</button>
<button onclick="show('attendance',this)">Attendance</button>
</div>

<!-- ORDER -->
<div id="order" class="section active glass">
<h3>Place Order</h3>

<label>Select Product</label>
<select id="product" onchange="setRate()">
<option value="">-- Select Product --</option>
</select>

<label>Rate (₹)</label>
<input type="number" id="rate" readonly>

<label>Quantity</label>
<input type="number" id="qty" oninput="calcTotal()">

<div class="total-box">
Total: ₹ <span id="total">0</span>
</div>

</div>

<!-- REPORT -->
<div id="report" class="section glass">
<h3>Sales Report</h3>
<p>Report section coming soon...</p>
</div>

<!-- ATTENDANCE -->
<div id="attendance" class="section glass">
<h3>Attendance</h3>
<p>Attendance section coming soon...</p>
</div>

</div>

<script>

// ================= LOGIN SYSTEM =================
let currentUser = "";

function login(email, role){
currentUser = role + " (" + email + ")";
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("userInfo").innerText=currentUser;
}

function logout(){
document.getElementById("login").style.display="flex";
document.getElementById("app").style.display="none";
}

// ================= NAVIGATION =================
function show(id,btn){
document.querySelectorAll(".section").forEach(sec=>sec.classList.remove("active"));
document.getElementById(id).classList.add("active");
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

// ================= PRODUCT SYSTEM =================
const products={
"LED TV":15000,
"Mobile Phone":12000,
"Laptop":45000
};

window.onload=function(){
let select=document.getElementById("product");
for(let item in products){
let option=document.createElement("option");
option.value=item;
option.textContent=item;
select.appendChild(option);
}
};

function setRate(){
let product=document.getElementById("product").value;
document.getElementById("rate").value=products[product]||0;
calcTotal();
}

function calcTotal(){
let rate=parseFloat(document.getElementById("rate").value)||0;
let qty=parseFloat(document.getElementById("qty").value)||0;
document.getElementById("total").innerText=rate*qty;
}

</script>

</body>
</html>
