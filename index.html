<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JN Marketing | Corporate Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
--accent:#d4af37;
--text:#f8fafc;
--danger:#ef4444;
--bg:rgba(255,255,255,0.05);
--glass-border: 1px solid rgba(255,255,255,0.1);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#020617;color:var(--text);min-height:100vh;}
.container{max-width:1200px;margin:auto;padding:20px;}
.glass{background:var(--bg);padding:20px;border-radius:12px;margin-bottom:20px; border: var(--glass-border); backdrop-filter: blur(10px);}
.logo{font-size:26px;font-weight:bold;color:var(--accent); letter-spacing: 1px;}
.nav button{padding:10px 15px;border:none;margin-right:5px;border-radius:6px;background:var(--bg);color:white;cursor:pointer; transition: 0.3s;}
.nav button.active{background:var(--accent);color:black; font-weight: 600;}
.nav button:hover:not(.active){background: rgba(255,255,255,0.1);}
.section{display:none; animation: fadeIn 0.5s ease;}
.section.active{display:block;}
input,select{width:100%;padding:12px;margin-bottom:10px;border-radius:6px;border:1px solid #333;background:#111;color:white; outline: none; transition: 0.3s;}
input:focus, select:focus{border-color: var(--accent);}
.btn{padding:10px 20px;border:none;border-radius:6px;cursor:pointer; font-weight: 600; transition: 0.3s;}
.btn-primary{background:var(--accent);color:black;}
.btn-primary:hover{opacity: 0.9; transform: translateY(-1px);}
.btn-danger{background:var(--danger);color:white;}
.btn-danger:hover{background: #dc2626;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #333;padding:12px;text-align:left;}
th{color:var(--accent); background: rgba(0,0,0,0.2);}
tr:hover td{background: rgba(255,255,255,0.02);}

/* Login Styles */
#login{position:fixed;width:100%;height:100%;background:#020617;display:flex;justify-content:center;align-items:center; z-index: 1000;}
.login-box{width:350px;text-align:center; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
.role-btn{width:100%;padding:12px;margin-bottom:15px;background:#111;color:white;border:1px solid #333;border-radius:6px;cursor:pointer; transition: 0.3s;}
.role-btn:hover{background:var(--accent);color:black; border-color: var(--accent);}
optgroup{background:#111;color:#d4af37;}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login">
<div class="glass login-box">
<h2 class="logo">JN MARKETING</h2>
<p style="margin-bottom: 20px; color: #aaa; font-size: 14px;">Select your role to continue</p>
<button class="role-btn" onclick="doLogin('whitedevil936960@gmail.com','Team Leader')">Team Leader Login</button>
<button class="role-btn" onclick="doLogin('Maurya.chandrabhaskar@gmail.com','CMO')">CMO Login</button>
</div>
</div>

<!-- MAIN APP -->
<div class="container" id="app" style="display:none;">

<div style="display:flex;justify-content:space-between; align-items:center; margin-bottom: 20px;">
<div class="logo">JN Marketing</div>
<div>
<span id="userInfo" style="margin-right: 15px; font-weight: 600;"></span>
<button class="btn btn-danger" onclick="logout()">Logout</button>
</div>
</div>

<div class="nav" style="margin-bottom: 20px;">
<button class="active" onclick="show('order',this)">New Order</button>
<button onclick="show('attendance',this)">Attendance</button>
</div>

<!-- ORDER SECTION -->
<div id="order" class="section active glass">
<h3 style="margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px;">Place Order</h3>

<input type="text" id="shopName" placeholder="Dukandar Name">
<input type="text" id="shopMobile" placeholder="Mobile Number">

<select id="product" onchange="setRate()">
<option value="">Select Product</option>

<optgroup label="🧹 Brooms">
<option value="45">Janta – ₹45</option>
<option value="70">3T – ₹70</option>
<option value="99">Jumbo – ₹99 (1kg DTG Powder Free)</option>
<option value="155">Gala King Kong – ₹155</option>
</optgroup>

<optgroup label="🧽 Scrub">
<option value="32">SS Scrub – ₹32 (1+1 Free)</option>
<option value="11">NS Scrub – ₹11</option>
<option value="32.70">Super Scrub – ₹32.70</option>
</optgroup>

<optgroup label="🪣 Wiper">
<option value="172.50">Gala Wiper – ₹172.50</option>
</optgroup>

<optgroup label="🍽 Dishwash">
<option value="22">250g – ₹22</option>
<option value="42">500g – ₹42</option>
</optgroup>

<optgroup label="🧴 Handwash">
<option value="60">250ml – ₹60 (+1 Free)</option>
</optgroup>

<optgroup label="🧼 Floor Cleaner">
<option value="42">1L – ₹42</option>
<option value="400">5L – ₹400 (1+1 Free)</option>
</optgroup>

<optgroup label="🚽 Toilet Cleaner">
<option value="30">250ml – ₹30</option>
<option value="92">500ml – ₹92 (1+1 Free)</option>
</optgroup>

<option value="35">🥥 Coco 400g – ₹35</option>

</select>

<input type="number" id="rate" readonly placeholder="Rate" style="background: #0f172a; color: #94a3b8;">
<input type="number" id="qty" placeholder="Quantity" oninput="calcTotal()">

<div style="display: flex; justify-content: space-between; align-items: center; margin: 15px 0;">
    <b style="font-size: 1.2rem;">Total ₹ <span id="total" style="color: var(--accent);">0.00</span></b>
    <button class="btn btn-primary" onclick="saveOrder()">Save Order</button>
</div>

<table>
<thead>
<tr>
<th>Shop</th>
<th>Product</th>
<th>Total</th>
<th>Action</th>
</tr>
</thead>
<tbody id="orderList"></tbody>
</table>
</div>

<!-- ATTENDANCE SECTION -->
<div id="attendance" class="section glass">
<h3 style="margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px;">Attendance</h3>
<div style="display: flex; gap: 10px; margin-bottom: 15px;">
    <input type="date" id="attDate" style="margin-bottom: 0;">
    <select id="attStatus" style="margin-bottom: 0; width: 150px;">
        <option value="Present">Present</option>
        <option value="Absent">Absent</option>
    </select>
    <button class="btn btn-primary" onclick="saveAttendance()" style="margin-bottom: 0;">Save</button>
</div>

<table>
<thead>
<tr>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="attList"></tbody>
</table>
</div>

</div>

<script>
// Renamed function to 'doLogin' to avoid conflict with 'id="login"'
function doLogin(email, role){
    document.getElementById('login').style.display="none";
    document.getElementById('app').style.display="block";
    document.getElementById('userInfo').innerText=role+" ("+email+")";
}

function logout(){
    document.getElementById('login').style.display="flex";
    document.getElementById('app').style.display="none";
}

function show(id,btn){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
}

function setRate(){
    // Get the value from the selected option
    let selectedOption = document.getElementById('product').options[document.getElementById('product').selectedIndex];
    rate.value = selectedOption.value || 0;
    calcTotal();
}

function calcTotal(){
    let r=parseFloat(rate.value)||0;
    let q=parseFloat(qty.value)||0;
    total.innerText=(r*q).toFixed(2);
}

// Data Storage
let orders=JSON.parse(localStorage.getItem("orders"))||[];
let attendance=JSON.parse(localStorage.getItem("attendance"))||[];
let editIndex=null;

// Order Functions
function saveOrder(){
    let productSelect = document.getElementById('product');
    let data={
        shop:shopName.value,
        mobile:shopMobile.value,
        product:productSelect.options[productSelect.selectedIndex].text,
        total:total.innerText
    };
    
    if(data.shop === "" || data.product === "Select Product" || data.total == "0.00"){
        alert("Please fill all details correctly");
        return;
    }

    if(editIndex!=null){
        orders[editIndex]=data;
        editIndex=null;
        // Reset inputs
        shopName.value = "";
        shopMobile.value = "";
        qty.value = "";
        rate.value = "";
        total.innerText = "0.00";
    }else{
        orders.push(data);
    }
    localStorage.setItem("orders",JSON.stringify(orders));
    renderOrders();
}

function renderOrders(){
    orderList.innerHTML="";
    orders.forEach((o,i)=>{
        orderList.innerHTML+=`
        <tr>
        <td>${o.shop}<br><small style="color:#aaa">${o.mobile}</small></td>
        <td>${o.product}</td>
        <td>₹${o.total}</td>
        <td>
        <button class="btn btn-primary" style="padding: 5px 10px; font-size: 12px;" onclick="editOrder(${i})">Edit</button>
        <button class="btn btn-danger" style="padding: 5px 10px; font-size: 12px;" onclick="deleteOrder(${i})">Delete</button>
        </td>
        </tr>`;
    });
}

function editOrder(i){
    let o=orders[i];
    shopName.value=o.shop;
    shopMobile.value=o.mobile;
    // We don't set product value easily because of optgroups, so we just set index
    // For simplicity in this demo, we just load the text
    editIndex=i;
}

function deleteOrder(i){
    if(confirm("Are you sure you want to delete this order?")){
        orders.splice(i,1);
        localStorage.setItem("orders",JSON.stringify(orders));
        renderOrders();
    }
}

// Attendance Functions
function saveAttendance(){
    let date = document.getElementById('attDate').value;
    if(!date){
        alert("Please select a date");
        return;
    }
    attendance.push({date:date, status:attStatus.value});
    localStorage.setItem("attendance",JSON.stringify(attendance));
    renderAttendance();
}

function renderAttendance(){
    attList.innerHTML="";
    attendance.forEach((a,i)=>{
        attList.innerHTML+=`
        <tr>
        <td>${a.date}</td>
        <td>${a.status}</td>
        <td>
        <button class="btn btn-danger" style="padding: 5px 10px; font-size: 12px;" onclick="deleteAtt(${i})">Delete</button>
        </td>
        </tr>`;
    });
}

function deleteAtt(i){
    if(confirm("Delete this attendance record?")){
        attendance.splice(i,1);
        localStorage.setItem("attendance",JSON.stringify(attendance));
        renderAttendance();
    }
}

// Initial Render
renderOrders();
renderAttendance();

</script>

</body>
</html>
