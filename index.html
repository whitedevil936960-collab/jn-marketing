<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JN Marketing | Corporate Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--accent:#d4af37;
--text:#f8fafc;
--success:#10b981;
--danger:#ef4444;
--bg:rgba(255,255,255,0.05);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#020617;color:var(--text);}
.container{max-width:1200px;margin:auto;padding:20px;}
.glass{background:var(--bg);padding:20px;border-radius:12px;margin-bottom:20px;}
.logo{font-size:26px;font-weight:bold;color:var(--accent);}
.nav button{padding:10px;border:none;margin-right:5px;border-radius:6px;background:var(--bg);color:white;cursor:pointer;}
.nav button.active{background:var(--accent);color:black;}
.section{display:none;}
.section.active{display:block;}
input,select{width:100%;padding:10px;margin-bottom:10px;border-radius:6px;border:1px solid #333;background:#111;color:white;}
.btn{padding:8px 12px;border:none;border-radius:6px;cursor:pointer;}
.btn-primary{background:var(--accent);color:black;}
.btn-danger{background:var(--danger);color:white;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #333;padding:8px;text-align:left;}
th{color:var(--accent);}
#login{position:fixed;width:100%;height:100%;background:#020617;display:flex;justify-content:center;align-items:center;}
.login-box{width:320px;text-align:center;}
.role-btn{width:100%;padding:10px;margin-bottom:10px;background:#111;color:white;border:none;border-radius:6px;cursor:pointer;}
.role-btn:hover{background:var(--accent);color:black;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
<div class="glass login-box">
<h2 class="logo">JN MARKETING</h2>
<button class="role-btn" onclick="login('whitedevil936960@gmail.com','Team Leader')">Team Leader Login</button>
<button class="role-btn" onclick="login('Maurya.chandrabhaskar@gmail.com','CMO')">CMO Login</button>
</div>
</div>

<!-- APP -->
<div class="container" id="app" style="display:none;">

<div style="display:flex;justify-content:space-between;">
<div class="logo">JN Marketing</div>
<div>
<span id="userInfo"></span>
<button class="btn btn-danger" onclick="logout()">Logout</button>
</div>
</div>

<div class="nav" style="margin:15px 0;">
<button class="active" onclick="show('order',this)">New Order</button>
<button onclick="show('attendance',this)">Attendance</button>
</div>

<!-- ORDER SECTION -->
<div id="order" class="section active glass">
<h3>Place Order</h3>

<input type="text" id="shopName" placeholder="Dukandar Name">
<input type="text" id="shopAddress" placeholder="Address">
<input type="text" id="shopMobile" placeholder="Mobile Number">

<select id="product"></select>
<input type="number" id="rate" readonly>
<input type="number" id="qty" placeholder="Quantity" oninput="calcTotal()">

<b>Total ₹ <span id="total">0</span></b><br><br>

<button class="btn btn-primary" onclick="saveOrder()">Save Order</button>

<table>
<thead>
<tr>
<th>Shop</th>
<th>Product</th>
<th>Total</th>
<th>Action</th>
</tr>
</thead>
<tbody id="orderList"></tbody>
</table>

</div>

<!-- ATTENDANCE -->
<div id="attendance" class="section glass">
<h3>Attendance</h3>

<input type="date" id="attDate">
<select id="attStatus">
<option value="Present">Present</option>
<option value="Absent">Absent</option>
</select>

<button class="btn btn-primary" onclick="saveAttendance()">Save</button>

<table>
<thead>
<tr>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="attList"></tbody>
</table>

</div>

</div>

<script>

// LOGIN
function login(email,role){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("userInfo").innerText=role+" ("+email+")";
}
function logout(){
document.getElementById("login").style.display="flex";
document.getElementById("app").style.display="none";
}

// NAV
function show(id,btn){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

// PRODUCT LIST
const products={
"🧹 Janta":₹45,
"🧹 3T":₹70,
"🧹 Jumbo":₹99, + 1kg d.t.g.powder free,
"🧹 Gala King Kong":₹155,
"🧽 SS Scrub":₹32,
"🧽 NS Scrub":11,
"🧽 Super Scrub":₹32.70,
"🪣 Gala Wiper":₹172.50,
"🍽 Dishwash 250g":₹22,
"🍽 Dishwash 500g":₹42,
"🧴 Handwash 250ml":₹60,
"🧼 Floor Cleaner 1L":₹42,
"🧼 Floor Cleaner 5L":₹400,1+1
"🚽 Toilet Cleaner 250ml":₹30,
"🚽 Toilet Cleaner 500ml":₹92,1+1,
"Coco 400g":₹35,
};

let orders=JSON.parse(localStorage.getItem("orders"))||[];
let attendance=JSON.parse(localStorage.getItem("attendance"))||[];
let editIndex=null;

// Load Products
window.onload=function(){
let select=document.getElementById("product");
select.innerHTML="<option value=''>Select Product</option>";
for(let p in products){
let op=document.createElement("option");
op.value=p;
op.textContent=p;
select.appendChild(op);
}
renderOrders();
renderAttendance();
};

document.getElementById("product").onchange=function(){
document.getElementById("rate").value=products[this.value]||0;
calcTotal();
};

function calcTotal(){
let r=parseFloat(document.getElementById("rate").value)||0;
let q=parseFloat(document.getElementById("qty").value)||0;
document.getElementById("total").innerText=r*q;
}

// SAVE ORDER
function saveOrder(){
let data={
shop:document.getElementById("shopName").value,
address:document.getElementById("shopAddress").value,
mobile:document.getElementById("shopMobile").value,
product:document.getElementById("product").value,
total:document.getElementById("total").innerText
};

if(editIndex!=null){
orders[editIndex]=data;
editIndex=null;
}else{
orders.push(data);
}

localStorage.setItem("orders",JSON.stringify(orders));
renderOrders();
}

// RENDER ORDER
function renderOrders(){
let list=document.getElementById("orderList");
list.innerHTML="";
orders.forEach((o,i)=>{
list.innerHTML+=`
<tr>
<td>${o.shop}<br>${o.mobile}</td>
<td>${o.product}</td>
<td>₹${o.total}</td>
<td>
<button onclick="editOrder(${i})">Edit</button>
<button onclick="deleteOrder(${i})">Delete</button>
</td>
</tr>`;
});
}

function editOrder(i){
let o=orders[i];
document.getElementById("shopName").value=o.shop;
document.getElementById("shopAddress").value=o.address;
document.getElementById("shopMobile").value=o.mobile;
document.getElementById("product").value=o.product;
document.getElementById("rate").value=products[o.product];
document.getElementById("qty").value=o.total/products[o.product];
calcTotal();
editIndex=i;
}

function deleteOrder(i){
orders.splice(i,1);
localStorage.setItem("orders",JSON.stringify(orders));
renderOrders();
}

// ATTENDANCE
function saveAttendance(){
let data={
date:document.getElementById("attDate").value,
status:document.getElementById("attStatus").value
};
attendance.push(data);
localStorage.setItem("attendance",JSON.stringify(attendance));
renderAttendance();
}

function renderAttendance(){
let list=document.getElementById("attList");
list.innerHTML="";
attendance.forEach((a,i)=>{
list.innerHTML+=`
<tr>
<td>${a.date}</td>
<td>${a.status}</td>
<td>
<button onclick="editAtt(${i})">Edit</button>
<button onclick="deleteAtt(${i})">Delete</button>
</td>
</tr>`;
});
}

function editAtt(i){
let a=attendance[i];
document.getElementById("attDate").value=a.date;
document.getElementById("attStatus").value=a.status;
attendance.splice(i,1);
localStorage.setItem("attendance",JSON.stringify(attendance));
renderAttendance();
}

function deleteAtt(i){
attendance.splice(i,1);
localStorage.setItem("attendance",JSON.stringify(attendance));
renderAttendance();
}

</script>

</body>
</html>
