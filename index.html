<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JN Marketing | Corporate Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
--accent:#d4af37;
--text:#f8fafc;
--danger:#ef4444;
--bg:rgba(255,255,255,0.05);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#020617;color:var(--text);}
.container{max-width:1200px;margin:auto;padding:20px;}
.glass{background:var(--bg);padding:20px;border-radius:12px;margin-bottom:20px;}
.logo{font-size:26px;font-weight:bold;color:var(--accent);}
.nav button{padding:10px;border:none;margin-right:5px;border-radius:6px;background:var(--bg);color:white;cursor:pointer;}
.nav button.active{background:var(--accent);color:black;}
.section{display:none;}
.section.active{display:block;}
input,select{width:100%;padding:10px;margin-bottom:10px;border-radius:6px;border:1px solid #333;background:#111;color:white;}
.btn{padding:8px 12px;border:none;border-radius:6px;cursor:pointer;}
.btn-primary{background:var(--accent);color:black;}
.btn-danger{background:var(--danger);color:white;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #333;padding:8px;text-align:left;}
th{color:var(--accent);}
#login{position:fixed;width:100%;height:100%;background:#020617;display:flex;justify-content:center;align-items:center;}
.login-box{width:320px;text-align:center;}
.role-btn{width:100%;padding:10px;margin-bottom:10px;background:#111;color:white;border:none;border-radius:6px;cursor:pointer;}
.role-btn:hover{background:var(--accent);color:black;}
optgroup{background:#111;color:#d4af37;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
<div class="glass login-box">
<h2 class="logo">JN MARKETING</h2>
<button class="role-btn" onclick="login('whitedevil936960@gmail.com','Team Leader')">Team Leader Login</button>
<button class="role-btn" onclick="login('Maurya.chandrabhaskar@gmail.com','CMO')">CMO Login</button>
</div>
</div>

<!-- APP -->
<div class="container" id="app" style="display:none;">

<div style="display:flex;justify-content:space-between;">
<div class="logo">JN Marketing</div>
<div>
<span id="userInfo"></span>
<button class="btn btn-danger" onclick="logout()">Logout</button>
</div>
</div>

<div class="nav" style="margin:15px 0;">
<button class="active" onclick="show('order',this)">New Order</button>
<button onclick="show('attendance',this)">Attendance</button>
</div>

<!-- ORDER -->
<div id="order" class="section active glass">
<h3>Place Order</h3>

<input type="text" id="shopName" placeholder="Dukandar Name">
<input type="text" id="shopAddress" placeholder="Address">
<input type="text" id="shopMobile" placeholder="Mobile Number">

<select id="product" onchange="setRate()">
<option value="">Select Product</option>

<optgroup label="🧹 Brooms">
<option value="45">Janta – ₹45</option>
<option value="70">3T – ₹70</option>
<option value="99">Jumbo – ₹99 (1kg DTG Powder Free)</option>
<option value="155">Gala King Kong – ₹155</option>
</optgroup>

<optgroup label="🧽 Scrub">
<option value="32">SS Scrub – ₹32 (1+1 Free)</option>
<option value="11">NS Scrub – ₹11</option>
<option value="32.70">Super Scrub – ₹32.70</option>
</optgroup>

<optgroup label="🪣 Wiper">
<option value="172.50">Gala Wiper – ₹172.50</option>
</optgroup>

<optgroup label="🍽 Dishwash">
<option value="22">250g – ₹22</option>
<option value="42">500g – ₹42</option>
</optgroup>

<optgroup label="🧴 Handwash">
<option value="60">250ml – ₹60 (+1 Free)</option>
</optgroup>

<optgroup label="🧼 Floor Cleaner">
<option value="42">1L – ₹42</option>
<option value="400">5L – ₹400 (1+1 Free)</option>
</optgroup>

<optgroup label="🚽 Toilet Cleaner">
<option value="30">250ml – ₹30</option>
<option value="92">500ml – ₹92 (1+1 Free)</option>
</optgroup>

<option value="35">🥥 Coco 400g – ₹35</option>

</select>

<input type="number" id="rate" readonly placeholder="Rate">
<input type="number" id="qty" placeholder="Quantity" oninput="calcTotal()">

<b>Total ₹ <span id="total">0.00</span></b><br><br>

<button class="btn btn-primary" onclick="saveOrder()">Save Order</button>

<table>
<thead>
<tr>
<th>Shop</th>
<th>Product</th>
<th>Total</th>
<th>Action</th>
</tr>
</thead>
<tbody id="orderList"></tbody>
</table>
</div>

<!-- ATTENDANCE -->
<div id="attendance" class="section glass">
<h3>Attendance</h3>
<input type="date" id="attDate">
<select id="attStatus">
<option value="Present">Present</option>
<option value="Absent">Absent</option>
</select>
<button class="btn btn-primary" onclick="saveAttendance()">Save</button>

<table>
<thead>
<tr>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="attList"></tbody>
</table>
</div>

</div>

<script>

function login(email,role){
login.style.display="none";
app.style.display="block";
userInfo.innerText=role+" ("+email+")";
}
function logout(){
login.style.display="flex";
app.style.display="none";
}
function show(id,btn){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}
function setRate(){
rate.value=product.value||0;
calcTotal();
}
function calcTotal(){
let r=parseFloat(rate.value)||0;
let q=parseFloat(qty.value)||0;
total.innerText=(r*q).toFixed(2);
}

let orders=JSON.parse(localStorage.getItem("orders"))||[];
let attendance=JSON.parse(localStorage.getItem("attendance"))||[];
let editIndex=null;

function saveOrder(){
let data={
shop:shopName.value,
mobile:shopMobile.value,
product:product.options[product.selectedIndex].text,
total:total.innerText
};
if(editIndex!=null){
orders[editIndex]=data;
editIndex=null;
}else{
orders.push(data);
}
localStorage.setItem("orders",JSON.stringify(orders));
renderOrders();
}

function renderOrders(){
orderList.innerHTML="";
orders.forEach((o,i)=>{
orderList.innerHTML+=`
<tr>
<td>${o.shop}<br>${o.mobile}</td>
<td>${o.product}</td>
<td>₹${o.total}</td>
<td>
<button onclick="editOrder(${i})">Edit</button>
<button onclick="deleteOrder(${i})">Delete</button>
</td>
</tr>`;
});
}
function editOrder(i){
let o=orders[i];
shopName.value=o.shop;
shopMobile.value=o.mobile;
editIndex=i;
}
function deleteOrder(i){
orders.splice(i,1);
localStorage.setItem("orders",JSON.stringify(orders));
renderOrders();
}
renderOrders();

// Attendance
function saveAttendance(){
attendance.push({date:attDate.value,status:attStatus.value});
localStorage.setItem("attendance",JSON.stringify(attendance));
renderAttendance();
}
function renderAttendance(){
attList.innerHTML="";
attendance.forEach((a,i)=>{
attList.innerHTML+=`
<tr>
<td>${a.date}</td>
<td>${a.status}</td>
<td>
<button onclick="deleteAtt(${i})">Delete</button>
</td>
</tr>`;
});
}
function deleteAtt(i){
attendance.splice(i,1);
localStorage.setItem("attendance",JSON.stringify(attendance));
renderAttendance();
}
renderAttendance();

</script>

</body>
</html>
