<!DOCTYPE html>
<html>
<head>
<title>JN Marketing Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background: linear-gradient(135deg,#141e30,#243b55);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  background:white;
  padding:40px;
  border-radius:15px;
  width:90%;
  max-width:350px;
  text-align:center;
  box-shadow:0 0 25px rgba(0,0,0,0.3);
}
h2{margin-bottom:20px;}
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background: linear-gradient(to right,#0072ff,#00c6ff);
  color:white;
  font-weight:bold;
  cursor:pointer;
}
button:hover{opacity:0.9;}
</style>
</head>
<body>

<div class="card">
<h2>JN Marketing Login</h2>
<input id="email" placeholder="Enter Email">
<button onclick="loginUser()">Login</button>
</div>

<script>
function loginUser(){
let email = document.getElementById("email").value;

let users = [
{name:"Chandrabhaskar",email:"cmo@gmail.com",role:"CMO"},
{name:"Rohit",email:"rohit@gmail.com",role:"TL"},
{name:"Amit",email:"amit@gmail.com",role:"FSI"}
];

let user = users.find(u=>u.email===email);

if(!user){
alert("User Not Found");
return;
}

localStorage.setItem("user",JSON.stringify(user));
window.location="dashboard.html";
}
</script>

</body>
</html>
