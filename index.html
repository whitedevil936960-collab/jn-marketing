<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JN Marketing | Corporate Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--primary:#0f172a;
--accent:#d4af37;
--text:#f8fafc;
--success:#10b981;
--danger:#ef4444;
--bg-glass: rgba(255,255,255,0.05);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#020617;color:var(--text); min-height: 100vh;}
.container{max-width:1200px;margin:auto;padding:20px;}
.glass{background:var(--bg-glass);padding:25px;border-radius:15px;margin-bottom:20px; border: 1px solid rgba(255,255,255,0.1);}
.logo{font-size:28px;font-weight:800;color:var(--accent); letter-spacing: 1px;}
.nav{display:flex;gap:10px;margin:20px 0; flex-wrap: wrap;}
.nav button{flex:1; min-width: 120px; padding:12px; border:none; border-radius:8px; cursor:pointer; background: rgba(255,255,255,0.05); color: white; transition: 0.3s;}
.nav button.active{background:var(--accent); color:black; font-weight:bold;}
.section{display:none; animation: fadeIn 0.5s;}
.section.active{display:block;}
input,select{width:100%; padding:12px; margin-bottom:15px; border-radius:8px; border:1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; outline: none;}
input:focus, select:focus{border-color: var(--accent);}
.btn{padding:12px; width:100%; border:none; border-radius:8px; background:var(--accent); font-weight:bold; cursor:pointer; transition: 0.3s;}
.btn:hover{opacity: 0.9;}
.btn-danger{background: var(--danger); color: white;}
.btn-secondary{background: rgba(255,255,255,0.1); color: white;}
.logout{background:var(--danger); color:white; margin-left:10px; width: auto; padding: 10px 20px;}

/* Login Styles */
#login{position:fixed;top:0;left:0;width:100%;height:100%;background:#020617;display:flex;justify-content:center;align-items:center; z-index: 1000;}
.login-box{width:350px; text-align:center;}
.role-btn{width:100%; padding:12px; margin-bottom:10px; background:rgba(255,255,255,0.1); border:none; color:white; border-radius:8px; cursor:pointer; transition: 0.3s;}
.role-btn:hover{background:var(--accent); color:black;}

/* Table Styles */
table {width: 100%; border-collapse: collapse; margin-top: 15px;}
th, td {padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1);}
th {color: var(--accent);}
.action-btn {padding: 5px 10px; border-radius: 4px; border: none; cursor: pointer; margin-right: 5px; font-size: 12px;}
.edit-btn {background: var(--accent); color: black;}
.delete-btn {background: var(--danger); color: white;}

/* Attendance Styles */
.attendance-card {text-align: center; padding: 20px;}
.status-badge {display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin: 10px 0;}
.status-present {background: rgba(16, 185, 129, 0.2); color: var(--success); border: 1px solid var(--success);}
.status-absent {background: rgba(239, 68, 68, 0.2); color: var(--danger); border: 1px solid var(--danger);}

@keyframes fadeIn {from {opacity: 0; transform: translateY(10px);} to {opacity: 1; transform: translateY(0);}}
</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="login">
<div class="glass login-box">
<h2 class="logo">JN MARKETING</h2>
<p style="margin:15px 0;color:gray;">Authorized Access Only</p>

<button class="role-btn" onclick="login('whitedevil936960@gmail.com','Team Leader')">
<i class="fas fa-user-tie"></i> Team Leader Login
</button>

<button class="role-btn" onclick="login('Maurya.chandrabhaskar@gmail.com','CMO')">
<i class="fas fa-user-tie"></i> CMO Login
</button>

</div>
</div>

<!-- MAIN APP -->
<div class="container" id="app" style="display:none;">

<div style="display:flex;justify-content:space-between;align-items:center; margin-bottom: 20px;">
<div class="logo">JN Marketing</div>
<div>
<span id="userInfo" style="margin-right: 15px; font-size: 0.9em; color: #ccc;"></span>
<button class="btn logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
</div>
</div>

<div class="nav">
<button class="active" onclick="show('order',this)"><i class="fas fa-plus-circle"></i> New Order</button>
<button onclick="show('report',this)"><i class="fas fa-chart-line"></i> Sales Report</button>
<button onclick="show('attendance',this)"><i class="fas fa-calendar-check"></i> Attendance</button>
</div>

<!-- ORDER SECTION -->
<div id="order" class="section active glass">
<h3><i class="fas fa-shopping-cart"></i> Place Order</h3>
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
    <div>
        <label>Select Product</label>
        <select id="product" onchange="setRate()">
            <option value="">-- Select Category --</option>
            <!-- Options populated by JS -->
        </select>
    </div>
    <div>
        <label>Rate (₹)</label>
        <input type="number" id="rate" placeholder="0.00" readonly>
    </div>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
    <div>
        <label>Quantity</label>
        <input type="number" id="qty" placeholder="0" oninput="calcTotal()">
    </div>
    <div>
        <label>Total Amount</label>
        <input type="text" id="total" placeholder="0.00" readonly style="color: var(--accent); font-weight: bold;">
    </div>
</div>

<button class="btn" id="submitBtn" onclick="saveOrder()">Submit Order</button>
<button class="btn btn-secondary" id="cancelEditBtn" onclick="resetForm()" style="display:none; margin-top: 10px;">Cancel Edit</button>
</div>

<!-- REPORT SECTION -->
<div id="report" class="section glass">
<h3><i class="fas fa-file-invoice-dollar"></i> Sales Report</h3>
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h2 id="totalSales" style="color: var(--accent);">₹0</h2>
    <button class="btn btn-secondary" onclick="renderOrders()" style="width: auto;"><i class="fas fa-sync"></i> Refresh</button>
</div>

<div class="glass" style="padding: 10px;">
    <h4>Order History</h4>
    <div style="overflow-x: auto;">
        <table id="orderTable">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Rate</th>
                    <th>Qty</th>
                    <th>Total</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="orderTableBody">
                <!-- Orders go here -->
            </tbody>
        </table>
    </div>
</div>
</div>

<!-- ATTENDANCE SECTION -->
<div id="attendance" class="section glass">
    <h3><i class="fas fa-user-clock"></i> Attendance Management</h3>
    <div class="attendance-card">
        <p id="currentDateDisplay" style="color: gray; margin-bottom: 10px;"></p>
        
        <div id="attendanceStatusDisplay" style="margin: 20px 0;">
            <!-- Status will be injected here -->
        </div>

        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="btn" style="background: var(--success);" onclick="markAttendance('Present')">Mark Present</button>
            <button class="btn btn-danger" onclick="markAttendance('Absent')">Mark Absent</button>
        </div>
    </div>
</div>

</div>

<script>
// --- DATA CONFIGURATION ---
const products = [
    // Brooms
    { name: "Broom - Janta", price: 45 },
    { name: "Broom - 3T", price: 70 },
    { name: "Broom - Jumbo (1kg DTG)", price: 99 },
    { name: "Broom - Gala King Kong", price: 155 },
    // Scrub
    { name: "Scrub - SS Scrub (1+1 Free)", price: 32 },
    { name: "Scrub - NS Scrub", price: 11 },
    { name: "Scrub - Super Scrub", price: 32.70 },
    // Wiper
    { name: "Wiper - Gala Wiper", price: 172.50 },
    // Dishwash
    { name: "Dishwash - 250g", price: 22 },
    { name: "Dishwash - 500g", price: 42 },
    // Handwash
    { name: "Handwash - 250ml (+1 Free)", price: 60 },
    // Floor Cleaner
    { name: "Floor Cleaner - 1L", price: 42 },
    { name: "Floor Cleaner - 5L (1+1 Free)", price: 400 },
    // Toilet Cleaner
    { name: "Toilet Cleaner - 250ml", price: 30 },
    { name: "Toilet Cleaner - 500ml (1+1 Free)", price: 92 },
    { name: "Toilet Cleaner - Coco 400g", price: 35 }
];

// --- STATE MANAGEMENT ---
let totalSales = 0;
let orders = []; // Array to store order objects
let currentEditIndex = -1; // -1 means creating new, >=0 means editing

const allowedUsers = {
    "whitedevil936960@gmail.com": "Team Leader",
    "Maurya.chandrabhaskar@gmail.com": "CMO"
};

// --- INITIALIZATION ---
window.onload = function() {
    populateProducts();
    loadAttendance();
};

// --- LOGIN LOGIC ---
function login(email, role) {
    if (allowedUsers[email] === role) {
        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "block";
        document.getElementById("userInfo").innerText = role + " | " + email;
        renderOrders(); // Load data on login
    } else {
        alert("Unauthorized Access");
    }
}

function logout() {
    location.reload();
}

// --- NAVIGATION ---
function show(id, btn) {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    document.querySelectorAll(".nav button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    
    if(id === 'report') renderOrders();
    if(id === 'attendance') loadAttendance();
}

// --- PRODUCT LOGIC ---
function populateProducts() {
    const select = document.getElementById("product");
    products.forEach((prod, index) => {
        let option = document.createElement("option");
        option.value = index; // Store index to access object
        option.text = prod.name + " - ₹" + prod.price;
        select.appendChild(option);
    });
}

function setRate() {
    let index = document.getElementById("product").value;
    if (index !== "") {
        document.getElementById("rate").value = products[index].price;
        calcTotal();
    } else {
        document.getElementById("rate").value = "";
        document.getElementById("total").value = "";
    }
}

function calcTotal() {
    let r = parseFloat(document.getElementById("rate").value) || 0;
    let q = parseFloat(document.getElementById("qty").value) || 0;
    document.getElementById("total").value = (r * q).toFixed(2);
}

// --- ORDER LOGIC ---
function saveOrder() {
    let prodIndex = document.getElementById("product").value;
    let rate = parseFloat(document.getElementById("rate").value) || 0;
    let qty = parseFloat(document.getElementById("qty").value) || 0;
    let total = parseFloat(document.getElementById("total").value) || 0;

    if (prodIndex === "" || qty <= 0) {
        alert("Please select a product and enter quantity.");
        return;
    }

    let productObj = products[prodIndex];
    let orderData = {
        product: productObj.name,
        rate: rate,
        qty: qty,
        total: total,
        date: new Date().toLocaleString()
    };

    if (currentEditIndex > -1) {
        // Update existing
        // Remove old total from global total
        totalSales -= orders[currentEditIndex].total;
        // Update array
        orders[currentEditIndex] = orderData;
        // Add new total
        totalSales += orderData.total;
        alert("Order Updated Successfully");
        currentEditIndex = -1; // Reset edit mode
        document.getElementById("submitBtn").innerText = "Submit Order";
        document.getElementById("cancelEditBtn").style.display = "none";
    } else {
        // Create new
        orders.push(orderData);
        totalSales += total;
        alert("Order Saved Successfully");
    }

    updateTotalDisplay();
    renderOrders();
    resetForm();
}

function renderOrders() {
    const tbody = document.getElementById("orderTableBody");
    tbody.innerHTML = "";

    if (orders.length === 0) {
        tbody.innerHTML = "<tr><td colspan='6' style='text-align:center;'>No orders found</td></tr>";
        return;
    }

    orders.forEach((order, index) => {
        let row = `<tr>
            <td>${order.product}</td>
            <td>₹${order.rate}</td>
            <td>${order.qty}</td>
            <td>₹${order.total}</td>
            <td style="font-size:0.8em; color:#aaa;">${order.date}</td>
            <td>
                <button class="action-btn edit-btn" onclick="editOrder(${index})"><i class="fas fa-edit"></i> Edit</button>
                <button class="action-btn delete-btn" onclick="deleteOrder(${index})"><i class="fas fa-trash"></i></button>
            </td>
        </tr>`;
        tbody.innerHTML += row;
    });
}

function editOrder(index) {
    let order = orders[index];
    currentEditIndex = index;

    // Find index in product list
    let prodIndex = products.findIndex(p => p.name === order.product);
    
    document.getElementById("product").value = prodIndex;
    document.getElementById("rate").value = order.rate;
    document.getElementById("qty").value = order.qty;
    document.getElementById("total").value = order.total;

    // Change UI for edit mode
    document.getElementById("submit
