<!DOCTYPE html>
<html>
<head>
<title>Sales Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
padding:20px;
}
.card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
max-width:800px;
margin:auto;
backdrop-filter:blur(10px);
}
.order{
background:rgba(255,255,255,0.2);
padding:10px;
margin:10px 0;
border-radius:10px;
}
.total{
color:#00ffcc;
font-weight:bold;
}
</style>
</head>
<body>

<div class="card">
<h2>Sales Report</h2>
<div id="report"></div>
</div>

<script>

let user=JSON.parse(localStorage.getItem("user"));
if(!user){window.location="index.html";}

let orders=JSON.parse(localStorage.getItem("orders")||"[]");

let html="";
let overallTotal=0;

orders.forEach(order=>{

html+=`<div class="order">
<b>Dukandar:</b> ${order.customer}<br>
<b>Salesman:</b> ${order.salesman} (${order.role})<br>
<b>Date:</b> ${order.date} | ${order.time}<br><br>`;

order.items.forEach(item=>{
html+=`${item.name} | Rate: ₹${item.rate} | Qty: ${item.qty} | ₹${item.total}<br>`;
});

html+=`<div class="total">Order Total: ₹${order.total}</div></div>`;

overallTotal+=order.total;

});

html+=`<h3>Total Sale: ₹${overallTotal.toFixed(2)}</h3>`;

document.getElementById("report").innerHTML=html;

</script>

</body>
</html>
