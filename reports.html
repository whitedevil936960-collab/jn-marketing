<!DOCTYPE html>
<html>
<head>
<title>JN Marketing - Sales Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Segoe UI; background:linear-gradient(135deg,#0f2027,#203a43,#2c5364); color:white; padding:20px;}
.card{background:rgba(255,255,255,0.1); padding:20px; border-radius:15px; max-width:1000px; margin:auto; backdrop-filter:blur(10px);}
button{padding:6px 10px; margin:4px; border:none; border-radius:6px; font-weight:bold; cursor:pointer;}
.order-box{background:rgba(0,0,0,0.3); padding:10px; margin:10px 0; border-radius:10px;}
.edit-btn{background:#ff9800; color:white;}
.delete-btn{background:#ff4444; color:white;}
.filter-btn{background:#00c6ff; color:white;}
</style>
</head>
<body>

<div class="card">
<h2>Sales Report - JN Marketing</h2>

<div>
<button class="filter-btn" onclick="filterOrders('Pending')">Order Pending</button>
<button class="filter-btn" onclick="filterOrders('Received')">Order Delivered</button>
<button class="filter-btn" onclick="filterOrders('All')">All Orders</button>
</div>

<div id="reportList"></div>
</div>

<script>
// Dummy login user
let user = {name:"Chandrabhaskar", role:"CMO"};

// Load orders
function loadOrders(status='All'){
    let orders = JSON.parse(localStorage.getItem("orders")||"[]");
    let html = "";

    orders.forEach((o,i)=>{
        if(status !== 'All' && o.payment !== status) return;

        html += `<div class="order-box">
        <b>Salesman:</b> ${o.salesman} (${o.role})<br>
        <b>Date & Time:</b> ${o.datetime}<br>
        <b>Dukandar:</b> ${o.customer}<br>
        <b>Address:</b> ${o.address}<br>
        <b>Mobile:</b> ${o.mobile}<br>
        <b>Payment:</b> ${o.payment} 
        <button class="edit-btn" onclick="editPayment(${i})">Edit Payment</button>
        <button class="delete-btn" onclick="deleteOrder(${i})">Delete Order</button>
        <br><b>Products:</b><br>`;
        o.items.forEach(p=>{
            html += `${p.name} | ₹${p.rate} x ${p.qty} = ₹${p.total.toFixed(2)}<br>`;
        });
        html += `<b>Total:</b> ₹${o.total.toFixed(2)}</div>`;
    });

    document.getElementById("reportList").innerHTML = html;
}

function editPayment(i){
    let orders = JSON.parse(localStorage.getItem("orders")||"[]");
    let newPay = prompt("Change Payment Status (Received/Pending):",orders[i].payment);
    if(newPay){
        orders[i].payment = newPay;
        localStorage.setItem("orders",JSON.stringify(orders));
        loadOrders();
    }
}

function deleteOrder(i){
    let orders = JSON.parse(localStorage.getItem("orders")||"[]");
    orders.splice(i,1);
    localStorage.setItem("orders",JSON.stringify(orders));
    loadOrders();
}

function filterOrders(status){
    loadOrders(status);
}

// Initial load
loadOrders();
</script>

</body>
</html>
