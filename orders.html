<!DOCTYPE html>
<html>
<head>
<title>Place Order</title>
<style>
body{
  font-family: Arial;
  text-align:center;
  background:#f2f2f2;
}
.container{
  background:white;
  padding:20px;
  margin:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}
select,input,button{
  padding:8px;
  margin:8px;
  width:80%;
}
button{
  background:#007bff;
  color:white;
  border:none;
}
h3{
  color:green;
}
</style>
</head>
<body>

<div class="container">

<h2>Place Order</h2>

Customer Name:<br>
<input id="cust" placeholder="Enter Customer Name"><br>

Product:<br>
<select id="product" onchange="setRate()">
<option value="">Select Product</option>

<!-- BROOMS -->
<option value="45">Janta Broom - ₹45</option>
<option value="70">3T Broom - ₹70</option>
<option value="99">Jumbo - ₹99 (1kg DTG Powder Free)</option>
<option value="155">Gala King Kong - ₹155</option>

<!-- SCRUB -->
<option value="32">SS Scrub - ₹32 (1+1 Free)</option>
<option value="11">NS Scrub - ₹11</option>
<option value="32.70">Super Scrub - ₹32.70</option>

<!-- WIPER -->
<option value="172.50">Gala Wiper - ₹172.50</option>

<!-- DISHWASH -->
<option value="22">Dishwash 250g - ₹22</option>
<option value="42">Dishwash 500g - ₹42</option>

<!-- HANDWASH -->
<option value="60">Handwash 250ml - ₹60 (+1 Free)</option>

<!-- FLOOR CLEANER -->
<option value="42">Floor Cleaner 1L - ₹42</option>
<option value="400">Floor Cleaner 5L - ₹400 (1+1 Free)</option>

<!-- TOILET CLEANER -->
<option value="30">Toilet Cleaner 250ml - ₹30</option>
<option value="92">Toilet Cleaner 500ml - ₹92 (1+1 Free)</option>

</select><br>

Rate:<br>
<input id="rate" readonly><br>

Quantity:<br>
<input id="qty" type="number" oninput="calculateTotal()"><br>

<h3 id="total">Total: ₹0</h3>

<button onclick="placeOrder()">Submit Order</button>

</div>

<script>

let user = JSON.parse(localStorage.getItem("user"));
if(!user){
  window.location="index.html";
}

function setRate(){
let rate = document.getElementById("product").value;
document.getElementById("rate").value = rate;
calculateTotal();
}

function calculateTotal(){
let rate = parseFloat(document.getElementById("rate").value) || 0;
let qty = parseFloat(document.getElementById("qty").value) || 0;
let total = rate * qty;
document.getElementById("total").innerHTML = "Total: ₹" + total.toFixed(2);
}

function placeOrder(){

let cust = document.getElementById("cust").value;
let productSelect = document.getElementById("product");
let productText = productSelect.options[productSelect.selectedIndex].text;
let rate = parseFloat(document.getElementById("rate").value) || 0;
let qty = parseFloat(document.getElementById("qty").value) || 0;
let total = rate * qty;

if(cust=="" || rate==0 || qty==0){
  alert("Please fill all details properly");
  return;
}

let orders = JSON.parse(localStorage.getItem("orders") || "[]");

orders.push({
customer:cust,
product:productText,
rate:rate,
qty:qty,
total:total
});

localStorage.setItem("orders", JSON.stringify(orders));

alert("Order Saved Successfully! Total = ₹" + total.toFixed(2));

document.getElementById("cust").value="";
document.getElementById("qty").value="";
document.getElementById("rate").value="";
document.getElementById("total").innerHTML="Total: ₹0";

}

</script>

</body>
</html>
