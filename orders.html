<!DOCTYPE html>
<html>
<head>
<title>Order Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Segoe UI;background:#1e3c72;color:white;padding:20px;}
.card{background:#ffffff20;padding:20px;border-radius:12px;max-width:900px;margin:auto;}
input,select{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:none;}
button{padding:8px 12px;margin:5px;border:none;border-radius:6px;background:#00c6ff;color:white;cursor:pointer;}
.item{background:#ffffff30;padding:6px;margin:4px 0;border-radius:6px;}
</style>
</head>
<body>

<div class="card">
<h2>Place Order</h2>

<input id="customer" placeholder="Dukandar Name">
<input id="address" placeholder="Address">
<input id="mobile" placeholder="Mobile">

<select id="payment">
<option value="">Payment Status</option>
<option value="Received">Received</option>
<option value="Pending">Pending</option>
</select>

<select id="product">
<option value="">Select Product</option>
<option value="45">Janta - ₹45</option>
<option value="70">3T - ₹70</option>
<option value="155">Gala King Kong - ₹155</option>
</select>

<input id="qty" type="number" placeholder="Quantity">

<button onclick="addProduct()">Add Product</button>

<div id="cart"></div>
<h3 id="grandTotal">Total: ₹0</h3>

<button onclick="saveOrder()">Submit Order</button>

<hr>
<h2>All Orders</h2>
<div id="orderList"></div>

</div>

<script>

let cart=[];
let grandTotal=0;

function addProduct(){
let productSelect=document.getElementById("product");
let productName=productSelect.options[productSelect.selectedIndex].text;
let rate=parseFloat(productSelect.value);
let qty=parseFloat(document.getElementById("qty").value);

if(!rate || !qty){alert("Select product & qty");return;}

let total=rate*qty;

cart.push({name:productName,rate,qty,total});
grandTotal+=total;

updateCart();
}

function updateCart(){
let html="";
cart.forEach(i=>{
html+=`<div class="item">${i.name} | ₹${i.rate} x ${i.qty} = ₹${i.total}</div>`;
});
document.getElementById("cart").innerHTML=html;
document.getElementById("grandTotal").innerHTML="Total: ₹"+grandTotal;
}

function saveOrder(){
let customer=document.getElementById("customer").value;
let address=document.getElementById("address").value;
let mobile=document.getElementById("mobile").value;
let payment=document.getElementById("payment").value;

if(!customer||!address||!mobile||!payment||cart.length==0){
alert("Fill all details");
return;
}

let orders=JSON.parse(localStorage.getItem("orders")||"[]");

orders.push({
customer,address,mobile,payment,
items:cart,total:grandTotal,
date:new Date().toLocaleString()
});

localStorage.setItem("orders",JSON.stringify(orders));

cart=[];grandTotal=0;
updateCart();
loadOrders();
}

function deleteOrder(index){
let orders=JSON.parse(localStorage.getItem("orders"));
orders.splice(index,1);
localStorage.setItem("orders",JSON.stringify(orders));
loadOrders();
}

function loadOrders(){
let orders=JSON.parse(localStorage.getItem("orders")||"[]");
let html="";
orders.forEach((o,i)=>{
html+=`<div class="item">
<b>${o.customer}</b> (${o.payment})<br>
₹${o.total}<br>
${o.date}<br>
<button onclick="deleteOrder(${i})">Delete</button>
</div>`;
});
document.getElementById("orderList").innerHTML=html;
}

loadOrders();

</script>

</body>
</html>
