<!DOCTYPE html>
<html>
<head>
<title>JN Marketing - Order System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
padding:20px;
}
.card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
max-width:1000px;
margin:auto;
backdrop-filter:blur(10px);
}
input,select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
}
button{
padding:8px 12px;
margin:4px;
border:none;
border-radius:8px;
background:linear-gradient(to right,#00c6ff,#0072ff);
color:white;
font-weight:bold;
cursor:pointer;
}
.edit-btn{background:#ff9800;}
.delete-btn{background:#ff4444;}
.item{
background:rgba(255,255,255,0.2);
padding:8px;
margin:6px 0;
border-radius:8px;
}
.total{
font-size:18px;
color:#00ffcc;
margin-top:10px;
}
.order-box{
background:rgba(0,0,0,0.3);
padding:10px;
margin-top:15px;
border-radius:10px;
}
</style>
</head>
<body>

<div class="card">

<h2>Place Order</h2>

<input id="customer" placeholder="Dukandar Name">
<input id="address" placeholder="Address">
<input id="mobile" placeholder="Mobile Number">

<select id="payment">
<option value="">Payment Status</option>
<option value="Received">Received</option>
<option value="Pending">Pending</option>
</select>

<select id="product">
<option value="">Select Product</option>
<option value="45">Janta - ₹45</option>
<option value="70">3T - ₹70</option>
<option value="99">Jumbo - ₹99</option>
<option value="155">Gala King Kong - ₹155</option>
<option value="32">SS Scrub - ₹32</option>
<option value="11">NS Scrub - ₹11</option>
<option value="32.70">Super Scrub - ₹32.70</option>
<option value="172.50">Gala Wiper - ₹172.50</option>
<option value="22">Dishwash 250g - ₹22</option>
<option value="42">Dishwash 500g - ₹42</option>
<option value="60">Handwash 250ml - ₹60</option>
<option value="42">Floor Cleaner 1L - ₹42</option>
<option value="400">Floor Cleaner 5L - ₹400</option>
<option value="30">Toilet Cleaner 250ml - ₹30</option>
<option value="92">Toilet Cleaner 500ml - ₹92</option>
</select>

<input id="qty" type="number" placeholder="Quantity">

<button onclick="addProduct()">Add Product</button>

<div id="cart"></div>
<div class="total" id="grandTotal">Grand Total: ₹0</div>

<button onclick="submitOrder()">Submit Order</button>

<hr>
<h2>All Orders / Sales Report</h2>
<div id="orderList"></div>

</div>

<script>

// Dummy login user (replace with real login)
let user = JSON.parse(localStorage.getItem("user")) || {name:"Rohit",role:"TL"};

let cart=[];
let grandTotal=0;

function addProduct(){
let select=document.getElementById("product");
if(select.value==""){alert("Select product"); return;}

let name=select.options[select.selectedIndex].text;
let rate=parseFloat(select.value);
let qty=parseFloat(document.getElementById("qty").value);

if(!qty){alert("Enter quantity"); return;}

let total=rate*qty;

cart.push({name,rate,qty,total});
updateCart();
document.getElementById("qty").value="";
}

function updateCart(){
grandTotal=0;
let html="";
cart.forEach((item,index)=>{
grandTotal+=item.total;
html+=`<div class="item">
<b>${item.name}</b><br>
Rate ₹${item.rate} | Qty ${item.qty} | Total ₹${item.total}<br>
<button class="edit-btn" onclick="editCartItem(${index})">Edit</button>
<button class="delete-btn" onclick="deleteCartItem(${index})">Delete</button>
</div>`;
});
document.getElementById("cart").innerHTML=html;
