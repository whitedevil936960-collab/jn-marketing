<!DOCTYPE html>
<html>
<head>
<title>JN Marketing - Order</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding:30px;
  width:90%;
  max-width:400px;
  border-radius:20px;
  box-shadow:0 0 30px rgba(0,0,0,0.4);
  color:white;
  text-align:center;
}

h2{
  margin-bottom:20px;
}

select,input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  outline:none;
  font-size:15px;
}

input[readonly]{
  background:#ddd;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  background: linear-gradient(to right,#0072ff,#00c6ff);
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

.total{
  font-size:18px;
  margin-top:10px;
  color:#00ffcc;
}

</style>
</head>

<body>

<div class="card">

<h2>Place Order</h2>

<input id="cust" placeholder="Customer Name">

<select id="product" onchange="setRate()">
<option value="">Select Product</option>

<option value="45">Janta Broom - ₹45</option>
<option value="70">3T Broom - ₹70</option>
<option value="99">Jumbo - ₹99 (1kg DTG Free)</option>
<option value="155">Gala King Kong - ₹155</option>

<option value="32">SS Scrub - ₹32 (1+1)</option>
<option value="11">NS Scrub - ₹11</option>
<option value="32.70">Super Scrub - ₹32.70</option>

<option value="172.50">Gala Wiper - ₹172.50</option>

<option value="22">Dishwash 250g - ₹22</option>
<option value="42">Dishwash 500g - ₹42</option>

<option value="60">Handwash 250ml - ₹60 (+1 Free)</option>

<option value="42">Floor Cleaner 1L - ₹42</option>
<option value="400">Floor Cleaner 5L - ₹400 (1+1)</option>

<option value="30">Toilet Cleaner 250ml - ₹30</option>
<option value="92">Toilet Cleaner 500ml - ₹92 (1+1)</option>

</select>

<input id="rate" placeholder="Rate" readonly>

<input id="qty" type="number" placeholder="Quantity" oninput="calculateTotal()">

<div class="total" id="total">Total: ₹0</div>

<button onclick="placeOrder()">Submit Order</button>

</div>

<script>

let user = JSON.parse(localStorage.getItem("user"));
if(!user){
  window.location="index.html";
}

function setRate(){
let rate = document.getElementById("product").value;
document.getElementById("rate").value = rate;
calculateTotal();
}

function calculateTotal(){
let rate = parseFloat(document.getElementById("rate").value) || 0;
let qty = parseFloat(document.getElementById("qty").value) || 0;
let total = rate * qty;
document.getElementById("total").innerHTML = "Total: ₹" + total.toFixed(2);
}

function placeOrder(){

let cust = document.getElementById("cust").value;
let productSelect = document.getElementById("product");
let productText = productSelect.options[productSelect.selectedIndex].text;
let rate = parseFloat(document.getElementById("rate").value) || 0;
let qty = parseFloat(document.getElementById("qty").value) || 0;
let total = rate * qty;

if(cust=="" || rate==0 || qty==0){
  alert("Fill all details properly");
  return;
}

let orders = JSON.parse(localStorage.getItem("orders") || "[]");

orders.push({
customer:cust,
product:productText,
rate:rate,
qty:qty,
total:total
});

localStorage.setItem("orders", JSON.stringify(orders));

alert("Order Saved! ₹" + total.toFixed(2));

document.getElementById("cust").value="";
document.getElementById("qty").value="";
document.getElementById("rate").value="";
document.getElementById("total").innerHTML="Total: ₹0";

}

</script>

</body>
</html>
