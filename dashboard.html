<h2>Attendance</h2>

<select id="attStatus">
  <option value="">Select Status</option>
  <option value="Present">Present</option>
  <option value="Absent">Absent</option>
</select>

<button onclick="markAttendance()">Submit Attendance</button>

<div id="attendanceList"></div>

<script>
function markAttendance(){
  let status = document.getElementById("attStatus").value;
  if(!status){ alert("Select status"); return; }

  let attendance = JSON.parse(localStorage.getItem("attendance")||"[]");

  attendance.push({
    name: "Rohit",
    role: "TL",
    status: status,
    datetime: new Date().toLocaleString()
  });

  localStorage.setItem("attendance",JSON.stringify(attendance));
  loadAttendance();
}

function loadAttendance(){
  let attendance = JSON.parse(localStorage.getItem("attendance")||"[]");
  let html = "";
  attendance.forEach(a=>{
    html += `<div style="background:rgba(255,255,255,0.2);padding:8px;margin:5px;border-radius:8px;">
      <b>${a.name}</b> (${a.role}) - ${a.status} <br>
      ${a.datetime}
    </div>`;
  });
  document.getElementById("attendanceList").innerHTML = html;
}

loadAttendance();
</script>
